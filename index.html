<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste mágico de Zero Kitten negativo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Cinzel',serif;
    background-color:#0d0a14;
    background-image:
        radial-gradient(circle at 20% 30%, rgba(88,28,135,.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(59,130,246,.1) 0%, transparent 45%);
    touch-action:none;
}
.magic-title{font-family:'Cinzel Decorative',serif}
.mystic-font{font-family:'Special Elite',monospace}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#110e1b}
::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:3px}
.ui-transition{transition:all .5s cubic-bezier(.4,0,.2,1)}
#focus-time-hud{display:none}
#focus-time-hud.visible{display:block}
.time-widget{display:flex;align-items:center;gap:12px;min-height:62px}
.hourglass-shell{--sand-progress:1;width:42px;height:58px;position:relative;flex:0 0 auto;filter:drop-shadow(0 0 8px rgba(245,158,11,.35))}
.hourglass-frame{position:absolute;inset:0;border:2px solid rgba(245,158,11,.75);clip-path:polygon(12% 0,88% 0,58% 50%,88% 100%,12% 100%,42% 50%);background:rgba(15,23,42,.72)}
.hourglass-chamber{position:absolute;left:11px;width:20px;height:20px;overflow:hidden;pointer-events:none}
.hourglass-chamber.top{top:7px;clip-path:polygon(0 0,100% 0,50% 100%)}
.hourglass-chamber.bottom{bottom:7px;clip-path:polygon(50% 0,100% 100%,0 100%)}
.hourglass-sand{position:absolute;left:0;right:0;bottom:0;height:100%;background:linear-gradient(to bottom,#fde68a,#f59e0b);transform-origin:bottom center;transition:transform 120ms linear,background 160ms linear}
.hourglass-chamber.top .hourglass-sand{transform:scaleY(var(--sand-progress))}
.hourglass-chamber.bottom .hourglass-sand{transform:scaleY(calc(1 - var(--sand-progress)))}
.hourglass-stream{position:absolute;left:50%;top:27px;width:2px;height:9px;transform:translateX(-50%);background:#fbbf24;opacity:.85;box-shadow:0 0 8px rgba(251,191,36,.8)}
.hourglass-shell.danger .hourglass-sand,.hourglass-shell.danger .hourglass-stream{background:linear-gradient(to bottom,#fecdd3,#f43f5e)}
.timer-details{flex:1;min-width:0}
.legacy-time-track{height:3px;background:rgba(15,23,42,.75);border:1px solid rgba(168,85,247,.15);border-radius:999px;overflow:hidden;margin-top:6px}
.legacy-time-fill{width:100%;height:100%;transform-origin:left center;transform:scaleX(1);background:linear-gradient(to right,#7c3aed,#ec4899,#f59e0b);transition:transform 120ms linear,background 160ms linear}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem;border-radius:.375rem;background:rgba(15,23,42,.42);border:1px solid rgba(168,85,247,.10)}
.item-row:hover{background:rgba(15,23,42,.62)}
</style>
</head>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio(){
    if(!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type){
    if(!audioCtx) return;
    try{
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if(type === 'draw'){
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120 + Math.random() * 40, now);
            osc.frequency.exponentialRampToValueAtTime(150 + Math.random() * 80, now + .1);
            gain.gain.setValueAtTime(.04, now);
            gain.gain.exponentialRampToValueAtTime(.001, now + .15);
            osc.start(now); osc.stop(now + .15);
        }else if(type === 'start'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.exponentialRampToValueAtTime(520, now + .4);
            gain.gain.setValueAtTime(.2, now);
            gain.gain.exponentialRampToValueAtTime(.001, now + .5);
            osc.start(now); osc.stop(now + .5);
        }else if(type === 'complete'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.setValueAtTime(659.25, now + .1);
            osc.frequency.setValueAtTime(783.99, now + .2);
            osc.frequency.setValueAtTime(1046.50, now + .3);
            gain.gain.setValueAtTime(.15, now);
            gain.gain.exponentialRampToValueAtTime(.001, now + .8);
            osc.start(now); osc.stop(now + .8);
        }else if(type === 'fail'){
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(60, now + .6);
            gain.gain.setValueAtTime(.15, now);
            gain.gain.exponentialRampToValueAtTime(.001, now + .7);
            osc.start(now); osc.stop(now + .7);
        }
    }catch(e){
        console.log('Erro de áudio desconsiderado:', e);
    }
}
</script>

const TIME_MODES = {

    relaxed: { value: 20, label: '20s' },
    normal: { value: 12, label: '12s' },
    swift: { value: 6, label: '6s' }
};

const BASE_ITEMS = {
    triangle: {

function safeJsonParse(raw, fallback){
    try{ return raw ? JSON.parse(raw) : fallback; }
    catch(err){ console.warn('JSON inválido no armazenamento local:', err); return fallback; }
}

function loadCustomItems(){
    customItems = safeJsonParse(localStorage.getItem(CUSTOM_ITEMS_STORAGE_KEY), {});
    const legacyCustomRunes = safeJsonParse(localStorage.getItem(LEGACY_CUSTOM_RUNES_STORAGE_KEY), {});
    Object.entries(legacyCustomRunes).forEach(([key, value]) => {
        if(!customItems[key]){
            customItems[key] = {
                name: value.name || 'Runa',
                type: value.type || 'rune',
                difficulty: value.difficulty || 'easy',
                paths: value.paths || []
            };
        }
    });

    const savedActiveItems = safeJsonParse(localStorage.getItem(ACTIVE_ITEMS_STORAGE_KEY), null);
    const legacyActiveRunes = safeJsonParse(localStorage.getItem(LEGACY_ACTIVE_RUNES_STORAGE_KEY), null);

    if(legacyActiveRunes && typeof legacyActiveRunes === 'object'){
        activeItems = { ...activeItems, ...legacyActiveRunes };
    }
    if(savedActiveItems && typeof savedActiveItems === 'object'){
        activeItems = { ...activeItems, ...savedActiveItems };
    }

    Object.keys(customItems).forEach(key => {
        if(activeItems[key] === undefined) activeItems[key] = true;
    });

    saveCustomItemsToStorage();
}

function saveCustomItemsToStorage(){
    try{
        localStorage.setItem(CUSTOM_ITEMS_STORAGE_KEY, JSON.stringify(customItems));
        localStorage.setItem(ACTIVE_ITEMS_STORAGE_KEY, JSON.stringify(activeItems));
    }catch(err){
        console.warn('Erro ao salvar grimório:', err);
    }
}

function getCloudSecret(){
    let secret = localStorage.getItem(CLOUD_SECRET_STORAGE_KEY) || '';
    if(secret) return secret;

    secret = window.prompt('Senha para salvar na nuvem:') || '';
    secret = secret.trim();

    if(secret){
        localStorage.setItem(CLOUD_SECRET_STORAGE_KEY, secret);
    }

    return secret;
}

function setCloudStatus(message, tone = 'neutral'){

    if(!el) return;

    el.textContent = message || '';
    el.classList.remove('text-purple-400', 'text-emerald-400', 'text-amber-400', 'text-red-400');

    if(tone === 'ok') el.classList.add('text-emerald-400');

    else if(tone === 'error') el.classList.add('text-red-400');
    else el.classList.add('text-purple-400');
}

function getGrimoirePayload(){
    return {
        version: 2,
        updatedAt: new Date().toISOString(),
        customItems,
        activeItems
    };
}

function normalizeCloudPayload(payload){
    if(!payload || typeof payload !== 'object') {
        return { customItems: {}, activeItems: {} };
    }

    return {
        customItems: payload.customItems && typeof payload.customItems === 'object' ? payload.customItems : {},
        activeItems: payload.activeItems && typeof payload.activeItems === 'object' ? payload.activeItems : {}
    };
}

function mergeCloudPayloadIntoLocal(payload){
    const normalized = normalizeCloudPayload(payload);

    // União conservadora: nunca remove designs locais do tablet.
    customItems = {
        ...normalized.customItems,
        ...customItems
    };

    activeItems = {
        ...normalized.activeItems,
        ...activeItems
    };

    Object.keys(BASE_ITEMS).forEach(key => {
        if(activeItems[key] === undefined) activeItems[key] = true;
    });

    Object.keys(customItems).forEach(key => {
        if(activeItems[key] === undefined) activeItems[key] = true;
    });

    saveCustomItemsToStorage();
}
async function loadFromCloud({ merge = true } = {}) {
    const response = await fetch('/api/load-grimoire', {
        method: 'GET'
    });

    if (response.status === 404) {
        return { customItems: {}, activeItems: {} };
    }

    if (!response.ok) {
        throw new Error(`Falha ao carregar nuvem: ${response.status}`);
    }

    const result = await response.json();

    const payload = result && result.data
        ? result.data
        : result;

    if (merge) {
        mergeCloudPayloadIntoLocal(payload);
        renderRuneCheckboxes();

        if (!gameStarted) {
            generateNewGlyph();
        }
    }

    return payload;
}

async function saveToCloudNow(){
    const secret = getCloudSecret();
    if(!secret){
        setCloudStatus('Nuvem sem senha', 'warn');
        return false;
    }

    const now = Date.now();
    if(now - lastCloudSaveAt < 1200){
        return false;
    }

    lastCloudSaveAt = now;
    setCloudStatus('Salvando na nuvem...', 'neutral');

    const response = await fetch('/api/save-grimoire', {
        method: 'POST',
        headers: {
            'content-type': 'application/json',
            'x-admin-secret': secret
        },
        body: JSON.stringify(getGrimoirePayload())
    });

    if(!response.ok){
        throw new Error(`Falha ao salvar nuvem: ${response.status}`);
    }

    setCloudStatus('Grimório salvo na nuvem', 'ok');
    return true;
}

function randomFrom(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function weightedRandomRuneKey(pool, items){
    if(!pool.length) return null;

    const currentRank = DIFFICULTY_RANK[currentDifficulty] || 1;
    const weighted = [];

    pool.forEach(key => {
        const item = items[key];
        const itemRank = DIFFICULTY_RANK[item.difficulty || 'easy'] || 1;
        let weight = 1;

        if(item.type === 'symbol'){
            if(itemRank === currentRank) weight = 6;
            else if(itemRank === currentRank - 1) weight = 2;
            else weight = 1;
        }

        for(let i = 0; i < weight; i++){
            weighted.push(key);
        }
    });

    return randomFrom(weighted);
}

function distanceToTemplatePoint(x, y, guidePoints){
    let minDist = 9999;
    for(let i = 0; i < guidePoints.length; i++){
        const guidePt = guidePoints[i];
        const dist = Math.hypot(guidePt.x - x, guidePt.y - y);
        if(dist < minDist) minDist = dist;
    }
    return minDist;
}

function getScoringGuidePoints(){
    const targetGuidePoints = [...currentGlyphTemplate.innerPoints];

    const cx = currentGlyphTemplate.circle.cx;
    const cy = currentGlyphTemplate.circle.cy;
    const r = currentGlyphTemplate.circle.r;

    for(let a = 0; a < Math.PI * 2; a += .075){
        targetGuidePoints.push({
            x: cx + r * Math.cos(a),
            y: cy + r * Math.sin(a)
        });
    }

    return targetGuidePoints;
}

function samplePlayerPointsForScore(){
    const sampled = [];
    for(let i = 0; i < playerPoints.length; i++){
        const p = playerPoints[i];
        if(i === 0 || p.isNewStroke){
            sampled.push(p);
            continue;
        }

        const prev = playerPoints[i - 1];
        if(prev.isNewStroke) {
            sampled.push(p);
            continue;
        }

        const dist = Math.hypot(p.x - prev.x, p.y - prev.y);
        const steps = Math.max(1, Math.ceil(dist / 5));

        for(let j = 1; j <= steps; j++){
            const t = j / steps;
            sampled.push({
                x: prev.x + (p.x - prev.x) * t,
                y: prev.y + (p.y - prev.y) * t
            });
        }
    }

    return sampled;
}


function symbolAllowedForCurrentDifficulty(item){

function updateTimeBars(displayText, percent, danger = false){
    const safePercent = Math.max(0, Math.min(100, percent));
    const progress = safePercent / 100;
    [
        { text:'time-display', bar:'time-bar', hourglass:'time-hourglass' },
        { text:'focus-time-display', bar:'focus-time-bar', hourglass:'focus-time-hourglass' }
    ].forEach(({ text, bar, hourglass }) => {
        const textEl = document.getElementById(text);
        const barEl = document.getElementById(bar);
        const hourglassEl = document.getElementById(hourglass);

        if(textEl) textEl.textContent = displayText;
        if(barEl){
            barEl.style.width = '100%';
            barEl.style.transform = `scaleX(${progress})`;
            barEl.style.background = danger
                ? 'linear-gradient(to right,#fb7185,#f43f5e)'
                : 'linear-gradient(to right,#7c3aed,#ec4899,#f59e0b)';
        }
        if(hourglassEl){
            hourglassEl.style.setProperty('--sand-progress', progress.toFixed(4));
            hourglassEl.classList.toggle('danger', danger);
        }
    });
}

function generateNewGlyph(){
    stopTimer();
    gameActive = true;
    gameStarted = false;
    isDrawing = false;
    playerPoints = [];
    circleProgressTrack = Array(72).fill(false);
    circleDrawnPoints = [];

    updateTimeInterface();

    document.getElementById('circle-progress').textContent = '0%';
    document.getElementById('circle-bar').style.width = '0%';

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const outerR = 210;

    currentGlyphTemplate = {
        circle: { cx, cy, r: outerR },
        innerPoints: [],
        shapes: []
    };

    const items = allItems();

    let symbolPool = Object.keys(items).filter(key => {
        const item = items[key];
        return activeItems[key] !== false && symbolAllowedForCurrentDifficulty(item);
    });

    let runePool = Object.keys(items).filter(key => {
        const item = items[key];
        return activeItems[key] !== false && item.type !== 'symbol';
    });

    if(symbolPool.length === 0){
        activeItems.square = true;
        symbolPool = ['square'];
        renderRuneCheckboxes();
    }
    if(runePool.length === 0){
        activeItems.magichourglass = true;
        runePool = ['magichourglass'];
        renderRuneCheckboxes();
    }

    const total = Math.max(1, Math.min(10, simultaneousSymbolsCount));
    const hasCenterSymbol = symbolPool.length > 0;
    const runeCount = hasCenterSymbol ? Math.max(0, total - 1) : total;

    if(hasCenterSymbol){
        const symbolKey = weightedRandomRuneKey(symbolPool, items);
        const symbolData = items[symbolKey];
        const paths = getItemPaths(symbolData);

        // Zona central reservada: o símbolo não deve invadir o anel das runas.
        // Quanto mais runas, menor o símbolo central para manter leitura visual.
        const centerScale = runeCount >= 7 ? .32 : runeCount >= 4 ? .37 : .45;
        const config = { scale: centerScale, rotation: 0, offsetX: 0, offsetY: 0 };
        addShapeToGlyph(symbolData.name, paths, config);
    }

    // Anel externo reservado para sigilos.
    // Mantém os sigilos afastados do círculo externo e fora da zona central da runa.
    // ringRadius menor = sigilos mais para dentro; scale menor = menos risco de encostar no círculo.
    const ringRadius = outerR * .68;
    const runeScale = runeCount <= 2 ? .18 : runeCount <= 4 ? .16 : runeCount <= 6 ? .145 : .125;

    for(let i = 0; i < runeCount; i++){
        const runeKey = randomFrom(runePool); // com repetição proposital
        const runeData = items[runeKey];
        const paths = getItemPaths(runeData);

        const angle = -Math.PI / 2 + (i * Math.PI * 2) / runeCount;
        const ox = ringRadius * Math.cos(angle);
        const oy = ringRadius * Math.sin(angle);

        // O topo local do sigilo é o eixo Y negativo. Esta rotação faz o topo apontar para o centro.
        const rotation = angle - Math.PI / 2;

        addShapeToGlyph(runeData.name, paths, {
            scale: runeScale,
            rotation,
            offsetX: ox,
            offsetY: oy
        });
    }

    redrawCanvas();
    hideOverlay();
}

function addShapeToGlyph(name, paths, config){
    currentGlyphTemplate.shapes.push({
        name,
        paths,
        scale: config.scale,
        rotation: config.rotation,
        offsetX: config.offsetX,
        offsetY: config.offsetY
    });

    populateShapeGuidePoints(
        paths,
        currentGlyphTemplate.circle.cx,
        currentGlyphTemplate.circle.cy,
        currentGlyphTemplate.circle.r,
        config.scale,
        config.rotation,
        config.offsetX,
        config.offsetY
    );
}

function populateShapeGuidePoints(paths, cx, cy, baseR, scale, rotation, offsetX, offsetY){
    const r = baseR * scale;
    paths.forEach(stroke => {
        for(let i = 0; i < stroke.length - 1; i++){
            const p1 = stroke[i];
            const p2 = stroke[i + 1];

            const x1 = cx + offsetX + r * (p1.x * Math.cos(rotation) - p1.y * Math.sin(rotation));
            const y1 = cy + offsetY + r * (p1.x * Math.sin(rotation) + p1.y * Math.cos(rotation));
            const x2 = cx + offsetX + r * (p2.x * Math.cos(rotation) - p2.y * Math.sin(rotation));
            const y2 = cy + offsetY + r * (p2.x * Math.sin(rotation) + p2.y * Math.cos(rotation));

            const dist = Math.hypot(x2 - x1, y2 - y1);
            const stepCount = Math.max(10, Math.floor(dist / 5));
            for(let j = 0; j <= stepCount; j++){
                const t = j / stepCount;
                currentGlyphTemplate.innerPoints.push({
                    x: x1 + (x2 - x1) * t,
                    y: y1 + (y2 - y1) * t
                });
            }
        }
    });
}

function redrawCanvas(){
    ctx.fillStyle = '#181124';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(88,28,135,.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, currentGlyphTemplate.circle.r + 44, 0, Math.PI * 2);
    ctx.stroke();

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = TEMPLATE_COLOR;

    ctx.lineWidth = 15;
    ctx.beginPath();
    ctx.arc(currentGlyphTemplate.circle.cx, currentGlyphTemplate.circle.cy, currentGlyphTemplate.circle.r, 0, Math.PI * 2);
    ctx.stroke();

    const cx = currentGlyphTemplate.circle.cx;
    const cy = currentGlyphTemplate.circle.cy;
    const baseR = currentGlyphTemplate.circle.r;

    currentGlyphTemplate.shapes.forEach(shape => {
        ctx.lineWidth = Math.max(2, 12 * shape.scale);
        const r = baseR * shape.scale;
        shape.paths.forEach(stroke => {
            ctx.beginPath();
            stroke.forEach((pt, idx) => {
                const rx = cx + shape.offsetX + r * (pt.x * Math.cos(shape.rotation) - pt.y * Math.sin(shape.rotation));
                const ry = cy + shape.offsetY + r * (pt.x * Math.sin(shape.rotation) + pt.y * Math.cos(shape.rotation));
                if(idx === 0) ctx.moveTo(rx, ry);
                else ctx.lineTo(rx, ry);
            });
            ctx.stroke();
        });
    });

    if(playerPoints.length > 0){
        ctx.lineWidth = LINE_WIDTH;
        ctx.strokeStyle = DRAW_COLOR;
        ctx.shadowColor = GLOW_COLOR;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        for(let i = 0; i < playerPoints.length; i++){
            const p = playerPoints[i];
            if(p.isNewStroke || i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

function startDrawing(e){
    if(!gameActive) return;
    initAudio();

    if(!gameStarted) startMinigame();

    isDrawing = true;
    const { x, y } = getCanvasCoords(e);
    lastX = x;
    lastY = y;

    playerPoints.push({ x, y, isNewStroke:true });
    trackCircleProgress(x, y);
    playSound('draw');
}

function draw(e){
    if(!isDrawing || !gameActive) return;

    const { x, y } = getCanvasCoords(e);
    const dist = Math.hypot(x - lastX, y - lastY);

    if(dist > 1.5){
        playerPoints.push({ x, y, isNewStroke:false });
        trackCircleSegment(lastX, lastY, x, y);
        lastX = x;
        lastY = y;
        redrawCanvas();
        if(Math.random() < .2) playSound('draw');
        checkCircleClosure();
    }
}

function stopDrawing(){
    isDrawing = false;
}

function getCanvasCoords(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
    };
}

function clearCanvas(){
    playerPoints = [];
    circleProgressTrack.fill(false);
    circleDrawnPoints = [];
    document.getElementById('circle-progress').textContent = '0%';
    document.getElementById('circle-bar').style.width = '0%';
    redrawCanvas();
}

function startMinigame(){
    gameStarted = true;
    startTime = Date.now();
    hideOverlay();
    playSound('start');

    const activeLimit = currentTimeMode === 'custom' ? customTimeValue : TIME_MODES[currentTimeMode].value;
    if(activeLimit === null) return;

    timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        timeRemaining = activeLimit - elapsed;

        if(timeRemaining <= 0){
            timeRemaining = 0;
            endGame(false, 'timeOut');
        }

        const percent = (timeRemaining / activeLimit) * 100;
        updateTimeBars(`${timeRemaining.toFixed(1)}s`, percent, percent < 30);
    }, 100);
}

function stopTimer(){
    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function trackCircleSegment(x1, y1, x2, y2){
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const steps = Math.max(1, Math.ceil(dist / 6));

    for(let i = 0; i <= steps; i++){
        const t = i / steps;
        trackCircleProgress(
            x1 + (x2 - x1) * t,
            y1 + (y2 - y1) * t
        );
    }
}

function trackCircleProgress(x, y){
    const cx = currentGlyphTemplate.circle.cx;
    const cy = currentGlyphTemplate.circle.cy;
    const r = currentGlyphTemplate.circle.r;

    const distFromCenter = Math.hypot(x - cx, y - cy);

    // O círculo externo agora é maior. A tolerância precisa ser mais generosa,
    // senão o jogador desenha visualmente sobre o guia mas o sistema não conta fatias.
    const tolerance = 44;

    if(Math.abs(distFromCenter - r) <= tolerance){
        const angle = Math.atan2(y - cy, x - cx);
        let normalizedAngle = angle;
        if(normalizedAngle < 0) normalizedAngle += Math.PI * 2;

        const sliceIndex = Math.floor((normalizedAngle / (Math.PI * 2)) * circleProgressTrack.length);
        if(sliceIndex >= 0 && sliceIndex < circleProgressTrack.length){
            circleProgressTrack[sliceIndex] = true;
        }

        circleDrawnPoints.push({ x, y });
    }

    const coveredSlices = circleProgressTrack.filter(Boolean).length;
    const progressPercent = Math.round((coveredSlices / circleProgressTrack.length) * 100);
    const visualPercent = Math.min(100, progressPercent);

    document.getElementById('circle-progress').textContent = `${visualPercent}%`;
    document.getElementById('circle-bar').style.width = `${visualPercent}%`;
}

function checkCircleClosure(){
    const coveredSlices = circleProgressTrack.filter(Boolean).length;
    const coverageRatio = coveredSlices / circleProgressTrack.length;
    let isClosed = false;

    // Mais rígido: o círculo precisa estar realmente quase completo.
    // No difícil, evita encerrar quando o jogador ainda fez só um arco torto ou largo.
    const minCoverageToClose = currentDifficulty === 'hard' ? .90 : currentDifficulty === 'medium' ? .87 : .84;
    const maxEndpointDistance = currentDifficulty === 'hard' ? 32 : currentDifficulty === 'medium' ? 38 : 46;
    const fullCoverageClose = currentDifficulty === 'hard' ? .98 : currentDifficulty === 'medium' ? .96 : .94;

    if(circleDrawnPoints.length > 24 && coverageRatio >= minCoverageToClose){
        const startPt = circleDrawnPoints[0];
        const latestPt = circleDrawnPoints[circleDrawnPoints.length - 1];
        const dist = Math.hypot(latestPt.x - startPt.x, latestPt.y - startPt.y);

        if(dist <= maxEndpointDistance) isClosed = true;
    }

    // Fechamento por cobertura só acontece quando praticamente todo o círculo foi coberto.
    if(coverageRatio >= fullCoverageClose) isClosed = true;

    if(isClosed) endGame(true, 'success');
}

function endGame(success, reason){
    stopTimer();
    gameActive = false;
    isDrawing = false;

    if(success){
        playSound('complete');
        const scoreDetails = calculateScore();
        showScoreResult(scoreDetails);
    }else{
        playSound('fail');
        if(reason === 'timeOut'){
            showOverlay(`
                <div class="space-y-4">
                    <h3 class="magic-title text-2xl font-bold text-red-400">Cabo o tempo</h3>
                    <button onclick="generateNewGlyph()" class="px-6 py-2.5 bg-gradient-to-r from-red-600 to-rose-500 hover:from-rose-500 hover:to-rose-400 text-slate-950 font-bold rounded text-xs uppercase tracking-widest transition-all font-sans">⟳</button>
                </div>
            `);
        }
    }
}


function buildCircleGuidePoints(){
    const points = [];
    const cx = currentGlyphTemplate.circle.cx;
    const cy = currentGlyphTemplate.circle.cy;
    const r = currentGlyphTemplate.circle.r;

    for(let a = 0; a < Math.PI * 2; a += .085){
        points.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }

    return points;
}

function measureGuideCoverage(guidePoints, sampledPlayerPoints, distanceThreshold, clampDistance){
    if(!guidePoints.length || !sampledPlayerPoints.length){
        return { coverage: 0, precision: 0, avgDeviation: clampDistance };
    }

    let hitCount = 0;
    let sumMinDist = 0;

    guidePoints.forEach(guidePt => {
        let minDist = 9999;
        sampledPlayerPoints.forEach(playerPt => {
            const dist = Math.hypot(guidePt.x - playerPt.x, guidePt.y - playerPt.y);
            if(dist < minDist) minDist = dist;
        });

        if(minDist <= distanceThreshold) hitCount++;
        sumMinDist += Math.min(minDist, clampDistance);
    });

    const avgDeviation = sumMinDist / guidePoints.length;
    return {
        coverage: hitCount / guidePoints.length,
        precision: Math.max(0, 1 - (avgDeviation / (distanceThreshold * 1.55))),
        avgDeviation
    };
}

function measurePlayerCleanliness(sampledPlayerPoints, guidePoints, offTemplateThreshold){
    if(!sampledPlayerPoints.length || !guidePoints.length){
        return { offTemplateRatio: 1, nearTemplateRatio: 0, cleanliness: 0, avgPlayerDeviation: 80 };
    }

    let offTemplateCount = 0;
    let nearTemplateCount = 0;
    let playerDistanceSum = 0;

    sampledPlayerPoints.forEach(playerPt => {
        const minDist = distanceToTemplatePoint(playerPt.x, playerPt.y, guidePoints);
        playerDistanceSum += Math.min(minDist, 80);

        if(minDist <= offTemplateThreshold) nearTemplateCount++;
        else offTemplateCount++;
    });

    const avgPlayerDeviation = playerDistanceSum / sampledPlayerPoints.length;

    return {
        offTemplateRatio: offTemplateCount / sampledPlayerPoints.length,
        nearTemplateRatio: nearTemplateCount / sampledPlayerPoints.length,
        cleanliness: Math.max(0, 1 - (avgPlayerDeviation / 36)),
        avgPlayerDeviation
    };
}

function calculateScore(){
    const activeLimit = currentTimeMode === 'custom' ? customTimeValue : TIME_MODES[currentTimeMode].value;
    let timeUsed = 0;
    if(startTime !== null) timeUsed = (Date.now() - startTime) / 1000;

    const distanceThreshold = currentDifficulty === 'hard' ? 15 : currentDifficulty === 'medium' ? 18 : 22;
    const offTemplateThreshold = currentDifficulty === 'hard' ? 23 : currentDifficulty === 'medium' ? 28 : 36;

    const sampledPlayerPoints = samplePlayerPointsForScore();
    const innerGuidePoints = [...currentGlyphTemplate.innerPoints];
    const circleGuidePoints = buildCircleGuidePoints();
    const allGuidePoints = [...innerGuidePoints, ...circleGuidePoints];

    const innerMetrics = measureGuideCoverage(innerGuidePoints, sampledPlayerPoints, distanceThreshold, 60);
    const circleMetrics = measureGuideCoverage(circleGuidePoints, sampledPlayerPoints, distanceThreshold + 3, 60);
    const cleanliness = measurePlayerCleanliness(sampledPlayerPoints, allGuidePoints, offTemplateThreshold);

    // O círculo externo é requisito de fechamento, mas não pode dominar a nota.
    // A parte interna agora vale a maior parte da precisão.
    let rawAccuracy =
        (innerMetrics.coverage * 0.42) +
        (innerMetrics.precision * 0.24) +
        (circleMetrics.coverage * 0.12) +
        (circleMetrics.precision * 0.06) +
        (cleanliness.nearTemplateRatio * 0.10) +
        (cleanliness.cleanliness * 0.06);

    const missingInnerPenalty = Math.max(0, 0.68 - innerMetrics.coverage) * (
        currentDifficulty === 'hard' ? 62 : currentDifficulty === 'medium' ? 48 : 34
    );

    const offTemplatePenalty = cleanliness.offTemplateRatio * (
        currentDifficulty === 'hard' ? 38 : currentDifficulty === 'medium' ? 28 : 18
    );

    // Cap duro: se a runa/sigilos internos quase não foram desenhados, não existe nota alta,
    // mesmo que o círculo esteja fechado. Isto corrige casos como círculo bom + centro ignorado.
    let accuracyCap = 100;
    if(innerMetrics.coverage < 0.16) accuracyCap = currentDifficulty === 'hard' ? 12 : 18;
    else if(innerMetrics.coverage < 0.28) accuracyCap = currentDifficulty === 'hard' ? 22 : 30;
    else if(innerMetrics.coverage < 0.42) accuracyCap = currentDifficulty === 'hard' ? 36 : 44;
    else if(innerMetrics.coverage < 0.55) accuracyCap = currentDifficulty === 'hard' ? 52 : 60;

    const finalAccuracyPercentage = Math.max(
        0,
        Math.min(accuracyCap, Math.round(rawAccuracy * 100 - missingInnerPenalty - offTemplatePenalty))
    );

    let calculatedScore = 1;
    if(finalAccuracyPercentage >= 96) calculatedScore = 20;
    else if(finalAccuracyPercentage >= 92) calculatedScore = 19;
    else if(finalAccuracyPercentage >= 88) calculatedScore = 18;
    else if(finalAccuracyPercentage >= 84) calculatedScore = 17;
    else if(finalAccuracyPercentage >= 80) calculatedScore = 16;
    else if(finalAccuracyPercentage >= 76) calculatedScore = 15;
    else if(finalAccuracyPercentage >= 72) calculatedScore = 14;
    else if(finalAccuracyPercentage >= 68) calculatedScore = 13;
    else if(finalAccuracyPercentage >= 64) calculatedScore = 12;
    else if(finalAccuracyPercentage >= 60) calculatedScore = 11;
    else if(finalAccuracyPercentage >= 55) calculatedScore = 10;
    else if(finalAccuracyPercentage >= 50) calculatedScore = 9;
    else if(finalAccuracyPercentage >= 45) calculatedScore = 8;
    else if(finalAccuracyPercentage >= 40) calculatedScore = 7;
    else if(finalAccuracyPercentage >= 35) calculatedScore = 6;
    else if(finalAccuracyPercentage >= 30) calculatedScore = 5;
    else if(finalAccuracyPercentage >= 25) calculatedScore = 4;
    else if(finalAccuracyPercentage >= 20) calculatedScore = 3;
    else if(finalAccuracyPercentage >= 10) calculatedScore = 2;
    else if(finalAccuracyPercentage <= 10) calculatedScore = 1;

    let timePenalty = 0;
    if(activeLimit !== null){
        const timeRatio = timeUsed / activeLimit;
        if(timeRatio > .95) timePenalty = 2;
        else if(timeRatio > .82) timePenalty = 1;
    }

    const scribblePenalty = cleanliness.offTemplateRatio > .42 ? 4 : cleanliness.offTemplateRatio > .30 ? 3 : cleanliness.offTemplateRatio > .20 ? 2 : cleanliness.offTemplateRatio > .12 ? 1 : 0;
    calculatedScore = Math.max(1, calculatedScore - timePenalty - scribblePenalty);

    let rank = '';
    if(calculatedScore === 20) rank = 'Sucesso crítico';
    else if(calculatedScore >= 19) rank = '★★★★★';
    else if(calculatedScore >= 17) rank = '★★★★☆';
    else if(calculatedScore >= 14) rank = '★★★☆☆';
    else if(calculatedScore >= 8) rank = '★★☆☆☆';
    else if(calculatedScore >= 2) rank = '★☆☆☆☆';
    else rank = 'Falha crítica';

    const diffLabel = currentDifficulty === 'easy' ? 'Fácil' : currentDifficulty === 'medium' ? 'Médio' : 'Difícil';
    const labelTime = currentTimeMode === 'custom' ? `${customTimeValue}s` : TIME_MODES[currentTimeMode].label;

    return {
        score: Math.min(20, Math.max(1, calculatedScore)),
        accuracy: finalAccuracyPercentage,
        timeSpent: timeUsed.toFixed(1),
        difficulty: `${diffLabel} - ${simultaneousSymbolsCount} elementos (${labelTime})`,
        penalty: timePenalty + scribblePenalty,
        rank
    };
}

    };

function sampleLine(x1, y1, x2, y2){
    const points = [];
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const steps = Math.max(10, Math.floor(dist / 4));
    for(let i = 0; i <= steps; i++){
        const t = i / steps;
        points.push({ x: x1 + (x2 - x1) * t, y: y1 + (y2 - y1) * t });
    }
    return points;
}

function sampleRect(x1, y1, x2, y2){
    return [
        sampleLine(x1, y1, x2, y1),
        sampleLine(x2, y1, x2, y2),
        sampleLine(x2, y2, x1, y2),
        sampleLine(x1, y2, x1, y1)
    ];
}

function sampleCircle(cx, cy, r){
    const points = [];
    const steps = Math.max(24, Math.floor(2 * Math.PI * r / 5));
    for(let i = 0; i <= steps; i++){
        const angle = (i / steps) * Math.PI * 2;
        points.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
    }
    return points;
}

function sampleBezier(x1, y1, cx, cy, x2, y2){
    const points = [];
    const dist = Math.hypot(cx - x1, cy - y1) + Math.hypot(x2 - cx, y2 - cy);
    const steps = Math.max(15, Math.floor(dist / 4));
    for(let i = 0; i <= steps; i++){
        const t = i / steps;
        const mt = 1 - t;
        points.push({
            x: mt * mt * x1 + 2 * mt * t * cx + t * t * x2,
            y: mt * mt * y1 + 2 * mt * t * cy + t * t * y2
        });
    }
    return points;
}

function startCreatorDraw(e){
    initAudio();
    const { x, y } = getCreatorCoords(e);

    if(creatorTool === 'bezier' && activeShape && activeShape.state === 'edit'){
        const distToHandle = Math.hypot(x - activeShape.cx, y - activeShape.cy);
        if(distToHandle <= 15){
            draggingHandle = true;
            return;
        }
        commitBezierCurve();
    }

    if(creatorTool === 'free'){
        isCreatorDrawing = true;
        creatorStrokes.push([{ x, y }]);
    }else{
        isCreatorDrawing = true;
        activeShape = { type:creatorTool, x1:x, y1:y, x2:x, y2:y, state:'drag' };
    }
    playSound('draw');
}

function creatorDraw(e){
    const { x, y } = getCreatorCoords(e);

    if(draggingHandle && activeShape && activeShape.type === 'bezier'){
        activeShape.cx = x;
        activeShape.cy = y;
        drawCreatorStroke();
        return;
    }

    if(!isCreatorDrawing) return;

    if(creatorTool === 'free'){
        const currentStroke = creatorStrokes[creatorStrokes.length - 1];
        const lastPt = currentStroke[currentStroke.length - 1];
        if(Math.hypot(x - lastPt.x, y - lastPt.y) > 2){
            currentStroke.push({ x, y });
            drawCreatorStroke();
        }
    }else{
        activeShape.x2 = x;
        activeShape.y2 = y;
        drawCreatorStroke();
    }
}

function stopCreatorDraw(){
    draggingHandle = false;
    if(!isCreatorDrawing) return;
    isCreatorDrawing = false;

    if(creatorTool === 'free'){
        updateCreatorHelpBar();
        return;
    }

    if(creatorTool === 'line'){
        creatorStrokes.push(sampleLine(activeShape.x1, activeShape.y1, activeShape.x2, activeShape.y2));
        activeShape = null;
    }else if(creatorTool === 'rect'){
        sampleRect(activeShape.x1, activeShape.y1, activeShape.x2, activeShape.y2).forEach(stroke => creatorStrokes.push(stroke));
        activeShape = null;
    }else if(creatorTool === 'circle'){
        const r = Math.hypot(activeShape.x2 - activeShape.x1, activeShape.y2 - activeShape.y1);
        if(r > 3) creatorStrokes.push(sampleCircle(activeShape.x1, activeShape.y1, r));
        activeShape = null;
    }else if(creatorTool === 'bezier'){
        activeShape.cx = (activeShape.x1 + activeShape.x2) / 2;
        activeShape.cy = (activeShape.y1 + activeShape.y2) / 2;
        activeShape.state = 'edit';
    }

    updateCreatorHelpBar();
    drawCreatorStroke();
}

function commitBezierCurve(){
    if(activeShape && activeShape.type === 'bezier' && activeShape.state === 'edit'){
        creatorStrokes.push(sampleBezier(activeShape.x1, activeShape.y1, activeShape.cx, activeShape.cy, activeShape.x2, activeShape.y2));
        activeShape = null;
        drawCreatorStroke();
        updateCreatorHelpBar();
    }
}

function undoCreatorLastStroke(){
    if(activeShape && activeShape.type === 'bezier' && activeShape.state === 'edit') activeShape = null;
    else if(creatorStrokes.length > 0) creatorStrokes.pop();
    drawCreatorStroke();
    updateCreatorHelpBar();
}

function updateCreatorHelpBar(){
    const bar = document.getElementById('creator-help-bar');
    if(!bar) return;

    if(activeShape && activeShape.type === 'bezier' && activeShape.state === 'edit'){
        bar.innerHTML = `
            <div class="flex items-center justify-center gap-2">
                <span class="text-amber-400 font-bold">Arraste a alça central para curvar</span>
                <button onclick="commitBezierCurve()" class="px-3 py-1 bg-amber-500 hover:bg-amber-400 text-slate-950 rounded font-bold uppercase text-[10px] tracking-wider transition-all">Fixar</button>
            </div>
        `;
        return;
    }

    let toolName = 'Pincel Livre';
    if(creatorTool === 'line') toolName = 'Linha Reta';
    else if(creatorTool === 'rect') toolName = 'Retângulo/Quadrado';
    else if(creatorTool === 'circle') toolName = 'Círculo';
    else if(creatorTool === 'bezier') toolName = 'Curva de Bézier';

    bar.innerHTML = `
        <div class="flex items-center justify-between w-full px-2">
            ${(creatorStrokes.length > 0 || activeShape) ? `<button onclick="undoCreatorLastStroke()" class="text-purple-400 hover:text-purple-300 text-[10px] uppercase font-bold tracking-wider font-sans">Desfazer</button>` : ''}
        </div>
    `;
}

function drawCreatorStroke(){
    if(!creatorCtx) return;
    creatorCtx.fillStyle = '#120a1a';
    creatorCtx.fillRect(0, 0, 220, 220);

    creatorCtx.lineWidth = 6;
    creatorCtx.strokeStyle = '#f59e0b';
    creatorCtx.shadowColor = '#fbbf24';
    creatorCtx.shadowBlur = 4;
    creatorCtx.lineCap = 'round';
    creatorCtx.lineJoin = 'round';

    creatorStrokes.forEach(stroke => {
        if(stroke.length === 0) return;
        creatorCtx.beginPath();
        creatorCtx.moveTo(stroke[0].x, stroke[0].y);
        for(let i = 1; i < stroke.length; i++) creatorCtx.lineTo(stroke[i].x, stroke[i].y);
        creatorCtx.stroke();
    });

    if(activeShape){
        creatorCtx.strokeStyle = '#a78bfa';
        creatorCtx.shadowColor = '#c084fc';
        creatorCtx.shadowBlur = 6;
        creatorCtx.lineWidth = 4;

        if(activeShape.type === 'line'){
            creatorCtx.beginPath();
            creatorCtx.moveTo(activeShape.x1, activeShape.y1);
            creatorCtx.lineTo(activeShape.x2, activeShape.y2);
            creatorCtx.stroke();
        }else if(activeShape.type === 'rect'){
            creatorCtx.beginPath();
            creatorCtx.rect(activeShape.x1, activeShape.y1, activeShape.x2 - activeShape.x1, activeShape.y2 - activeShape.y1);
            creatorCtx.stroke();
        }else if(activeShape.type === 'circle'){
            const r = Math.hypot(activeShape.x2 - activeShape.x1, activeShape.y2 - activeShape.y1);
            creatorCtx.beginPath();
            creatorCtx.arc(activeShape.x1, activeShape.y1, r, 0, Math.PI * 2);
            creatorCtx.stroke();
        }else if(activeShape.type === 'bezier'){
            creatorCtx.beginPath();
            creatorCtx.moveTo(activeShape.x1, activeShape.y1);
            if(activeShape.state === 'drag') creatorCtx.lineTo(activeShape.x2, activeShape.y2);
            else if(activeShape.state === 'edit') creatorCtx.quadraticCurveTo(activeShape.cx, activeShape.cy, activeShape.x2, activeShape.y2);
            creatorCtx.stroke();

            if(activeShape.state === 'edit'){
                creatorCtx.shadowBlur = 0;
                creatorCtx.strokeStyle = 'rgba(167,139,250,.4)';
                creatorCtx.lineWidth = 1;
                creatorCtx.setLineDash([3,3]);
                creatorCtx.beginPath();
                creatorCtx.moveTo(activeShape.x1, activeShape.y1);
                creatorCtx.lineTo(activeShape.cx, activeShape.cy);
                creatorCtx.lineTo(activeShape.x2, activeShape.y2);
                creatorCtx.stroke();
                creatorCtx.setLineDash([]);

                creatorCtx.fillStyle = '#fbbf24';
                creatorCtx.strokeStyle = '#fff';
                creatorCtx.lineWidth = 2;
                creatorCtx.beginPath();
                creatorCtx.arc(activeShape.cx, activeShape.cy, 6, 0, Math.PI * 2);
                creatorCtx.fill();
                creatorCtx.stroke();
            }
        }
    }

    creatorCtx.shadowBlur = 0;
}

function saveCustomRune(){
    if(activeShape && activeShape.type === 'bezier' && activeShape.state === 'edit') commitBezierCurve();

    const nameInput = document.getElementById('custom-rune-name');
    const fallback = creatorCategory === 'symbol'
        ? `Runa ${Object.keys(customItems).length + 1}`
        : `Sigilo ${Object.keys(customItems).length + 1}`;
    const name = nameInput.value.trim() || fallback;

    if(creatorStrokes.length === 0 || creatorStrokes.every(s => s.length < 2)) return;

    let minX = 9999, maxX = -9999, minY = 9999, maxY = -9999;
    creatorStrokes.forEach(stroke => {
        stroke.forEach(pt => {
            if(pt.x < minX) minX = pt.x;
            if(pt.x > maxX) maxX = pt.x;
            if(pt.y < minY) minY = pt.y;
            if(pt.y > maxY) maxY = pt.y;
        });
    });

    const maxSpan = Math.max(maxX - minX, maxY - minY) || 1;
    if(maxSpan < 12) return;

    const midX = (minX + maxX) / 2;
    const midY = (minY + maxY) / 2;

    const normalizedPaths = creatorStrokes.map(stroke => stroke.map(pt => ({
        x: (pt.x - midX) / (maxSpan / 2),
        y: (pt.y - midY) / (maxSpan / 2)
    })));

    const itemId = `custom_${Date.now()}`;
    customItems[itemId] = {
        name,
        type: creatorCategory,
        difficulty: creatorCategory === 'symbol' ? creatorDifficulty : 'easy',
        paths: normalizedPaths
    };

    activeItems[itemId] = true;

    saveCustomItemsToStorage();
    renderRuneCheckboxes();
    closeCreatorModal();

    if(!gameStarted) generateNewGlyph();
}

function showScoreResult(details){
    document.getElementById('modal-score').textContent = details.score;
    document.getElementById('modal-precision').textContent = `${details.accuracy}%`;
    document.getElementById('modal-time').textContent = `${details.timeSpent}s`;
    document.getElementById('modal-diff').textContent = details.difficulty;
    document.getElementById('modal-penalty').textContent = details.penalty > 0 ? `-${details.penalty} pts` : 'Nenhuma';
    document.getElementById('score-rank').textContent = details.rank;

    const modal = document.getElementById('score-modal');
    const content = document.getElementById('score-modal-content');

    modal.classList.remove('hidden');
    setTimeout(() => {
        content.classList.remove('scale-95','opacity-0');
        content.classList.add('scale-100','opacity-100');
    }, 50);
}

function closeScoreModal(){
    const modal = document.getElementById('score-modal');
    const content = document.getElementById('score-modal-content');

    content.classList.remove('scale-100','opacity-100');
    content.classList.add('scale-95','opacity-0');

    setTimeout(() => modal.classList.add('hidden'), 300);
}

function showOverlay(htmlContent){
    const overlay = document.getElementById('status-overlay');
    const content = document.getElementById('overlay-content');

    content.innerHTML = htmlContent;
    overlay.classList.remove('opacity-0','pointer-events-none');
    overlay.classList.add('opacity-100');

    setTimeout(() => {
        content.classList.remove('scale-95');
        content.classList.add('scale-100');
    }, 50);
}

function hideOverlay(){
    const overlay = document.getElementById('status-overlay');
    const content = document.getElementById('overlay-content');

    content.classList.remove('scale-100');
    content.classList.add('scale-95');

    overlay.classList.add('opacity-0','pointer-events-none');
    overlay.classList.remove('opacity-100');
}
</script>
